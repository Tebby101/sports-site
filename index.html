<!DOCTYPE html>
<html>
<head>
  <title>My Sports Website</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e3a8a;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
    }

    .card:hover {
      background: #374151;
    }
  </style>
</head>

<body>

  <header>
    🏆 My Sports Website
  </header>

  <div class="container">
    <div class="card">⚽ Football</div>
    <div class="card">🏀 Basketball</div>
    <div class="card">🥊 UFC</div>
  </div>

</body>
</html>
