<!DOCTYPE html>
<html>
<head>
  <title>Sports Hub Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
    }

    .header {
      background: #2563eb;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background: #111827;
      padding: 10px;
      font-size: 13px;
    }

    .tabs a {
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .tabs a:hover {
      background: #1f2937;
    }

    .container {
      padding: 15px;
    }

    .section-title {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 15px;
    }

    .card {
      background: #1f2937;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #3b82f6;
    }

    .live {
      color: #22c55e;
      font-weight: bold;
      font-size: 12px;
    }

    .upcoming {
      color: #f59e0b;
      font-weight: bold;
      font-size: 12px;
    }

    .score {
      float: right;
      color: #22c55e;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <div class="header">🏆 SPORTS HUB PRO</div>

  <div class="tabs">
    <a href="index.html">Home</a>
    <a href="football.html">Football</a>
    <a href="basketball.html">Basketball</a>
    <a href="ufc.html">UFC</a>
  </div>

  <div class="container">

    <div class="section-title">🔥 LIVE MATCHES</div>

    <div class="card">
      <span class="live">LIVE</span>
      Man United vs Liverpool
      <span class="score">2 - 1</span>
    </div>

    <div class="card">
      <span class="live">LIVE</span>
      Lakers vs Bulls
      <span class="score">98 - 95</span>
    </div>

    <div class="section-title">⏰ UPCOMING</div>

    <div class="card">
      <span class="upcoming">SOON</span>
      UFC Main Event
    </div>

  </div>

</body>
</html>
