<!DOCTYPE html>
<html>
<head>
  <title>Sports Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .header {
      background: #1d4ed8;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .menu {
      display: flex;
      justify-content: space-around;
      background: #111827;
      padding: 10px;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 13px;
    }

    .container {
      padding: 15px;
    }

    .live {
      background: #ef4444;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .card {
      background: #1f2937;
      margin: 12px 0;
      padding: 15px;
      border-radius: 12px;
      border-left: 5px solid #3b82f6;
    }

    .match {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-top: 8px;
    }

    .team {
      font-weight: bold;
    }

    .score {
      color: #22c55e;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 6px;
    }
  </style>

</head>

<body>

  <div class="header">🏆 LIVE SPORTS HUB</div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="football.html">Football</a>
    <a href="basketball.html">Basketball</a>
    <a href="ufc.html">UFC</a>
  </div>

  <div class="container">

    <div class="card">
      <div class="live">LIVE</div>

      <div class="match">
        <div class="team">Man United</div>
        <div class="score">2 - 1</div>
        <div class="team">Liverpool</div>
      </div>

      <div class="small">Premier League • 75 min</div>
    </div>

    <div class="card">
      <div class="live">LIVE</div>

      <div class="match">
        <div class="team">Lakers</div>
        <div class="score">98 - 95</div>
        <div class="team">Bulls</div>
      </div>

      <div class="small">NBA • 4th Quarter</div>
    </div>

    <div class="card">
      <div class="live">UPCOMING</div>

      <div class="match">
        <div class="team">UFC Fight Night</div>
        <div class="score">-</div>
        <div class="team">Tonight</div>
      </div>

      <div class="small">Main Event</div>
    </div>

  </div>

</body>
</html>
