<!DOCTYPE html>
<html>
<head>
  <title>Sports Pro API</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    .top {
      background: #1d4ed8;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: #1f2937;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      text-align: left;
    }

    .status {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="top">🏆 SPORTS PRO API DASHBOARD</div>

  <p class="status">Loading live data...</p>

  <div id="matches"></div>

  <script>
    const API_URL = "https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2024-01-01&s=Soccer";

    async function loadMatches() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let output = "";

        if (data && data.events) {

          data.events.slice(0, 10).forEach(match => {
            output += `
              <div class="card">
                <h3>${match.strEvent || "Unknown Match"}</h3>
                <p>🏆 League: ${match.strLeague || "N/A"}</p>
                <p>📅 Date: ${match.dateEvent || "N/A"}</p>
                <p>🏟️ Status: ${match.strStatus || "Scheduled"}</p>
              </div>
            `;
          });

        } else {
          output = "<div class='card'>No data available right now</div>";
        }

        document.getElementById("matches").innerHTML = output;
        document.querySelector(".status").innerText = "Live data loaded ✔";

      } catch (err) {
        document.getElementById("matches").innerHTML =
          "<div class='card'>API error — retrying...</div>";
      }
    }

    loadMatches();

    // AUTO REFRESH every 60 seconds (PRO FEATURE)
    setInterval(loadMatches, 60000);
  </script>

</body>
</html>
