<!DOCTYPE html>
<html>
<head>
  <title>Sports App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .header {
      background: #1d4ed8;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .menu {
      display: flex;
      justify-content: space-around;
      background: #111827;
      padding: 10px;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 13px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1f2937;
      margin: 12px 0;
      padding: 15px;
      border-radius: 12px;
      border-left: 5px solid #3b82f6;
    }

    .football { border-left-color: #22c55e; }
    .basketball { border-left-color: #f97316; }
    .ufc { border-left-color: #ef4444; }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>

</head>

<body>

  <div class="header">🏆 Sports Dashboard</div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="football.html">Football</a>
    <a href="basketball.html">Basketball</a>
    <a href="ufc.html">UFC</a>
  </div>

  <div class="container">

    <div class="card football">
      <div class="title">⚽ Football Live</div>
      <div class="small">No live matches yet</div>
    </div>

    <div class="card basketball">
      <div class="title">🏀 Basketball Updates</div>
      <div class="small">Games loading soon</div>
    </div>

    <div class="card ufc">
      <div class="title">🥊 UFC News</div>
      <div class="small">Fights & events</div>
    </div>

  </div>

</body>
</html>
