<!DOCTYPE html>
<html>
<head>
  <title>Live Sports API</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    .top {
      background: #1d4ed8;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: #1f2937;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="top">🏆 LIVE SPORTS API</div>

  <h3>Loading live matches...</h3>

  <div id="matches"></div>

  <script>
    async function loadData() {
      try {
        const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2024-01-01&s=Soccer");
        const data = await res.json();

        let html = "";

        if (data.events) {
          data.events.forEach(event => {
            html += `
              <div class="card">
                <h3>${event.strEvent}</h3>
                <p>${event.strLeague}</p>
                <p>${event.dateEvent}</p>
              </div>
            `;
          });
        } else {
          html = "<p>No live data found</p>";
        }

        document.getElementById("matches").innerHTML = html;

      } catch (error) {
        document.getElementById("matches").innerHTML = "<p>Error loading API</p>";
      }
    }

    loadData();
  </script>

</body>
</html>
